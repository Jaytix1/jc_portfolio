<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
    <defs>
        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#58a6ff"/>
            <stop offset="100%" style="stop-color:#a371f7"/>
        </linearGradient>
        <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#79b8ff"/>
            <stop offset="100%" style="stop-color:#c4a5f9"/>
        </linearGradient>
    </defs>
    <!-- Shield shape -->
    <path d="M20 2 L36 8 L36 18 C36 28 28 36 20 38 C12 36 4 28 4 18 L4 8 Z"
          fill="url(#shieldGradient)" opacity="0.9"/>
    <!-- Inner shield highlight -->
    <path d="M20 5 L33 10 L33 18 C33 26 26 33 20 35 C14 33 7 26 7 18 L7 10 Z"
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- AI Eye -->
    <ellipse cx="20" cy="18" rx="8" ry="6" fill="#0d1117" opacity="0.8"/>
    <ellipse cx="20" cy="18" rx="6" ry="4.5" fill="none" stroke="url(#eyeGradient)" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="3" fill="url(#eyeGradient)"/>
    <circle cx="21" cy="17" r="1" fill="white" opacity="0.8"/>
    <!-- Scan lines -->
    <line x1="10" y1="26" x2="30" y2="26" stroke="url(#eyeGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="29" x2="28" y2="29" stroke="url(#eyeGradient)" stroke-width="1" opacity="0.3"/>
</svg>
